plugins:
  - rubocop-rspec

inherit_from:
  - .rubocop_todo.yml
  - .rubocop-shared.yml

AllCops:
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'coverage/**/*'
    - 'bin/**/*'
    - 'node_modules/**/*'
    - 'site/**/*'
    - '**/*.md'

Naming/PredicatePrefix:
  Enabled: true
  AllowedMethods:
    - is_a?
    - has_preferred_network?
    - is_wifi_interface?

RSpec/AnyInstance:
  Exclude:
    - 'spec/support/**/*.rb'

# Specs are organized by component area rather than by the flat WifiWand
# constant namespace; enforcing constant-mirrored paths would make browsing worse.
RSpec/SpecFilePathFormat:
  Enabled: false

# The suite uses receive expectations to document command and integration
# boundaries; requiring allow-only stubs would weaken useful call assertions.
RSpec/StubbedMock:
  Enabled: false
