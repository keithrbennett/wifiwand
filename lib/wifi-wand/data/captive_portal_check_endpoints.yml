---
# These endpoints return a specific HTTP status code when real internet is available.
# Captive portals intercept the request and return 302 redirects or 200 HTML pages instead.
# We use HTTP (not HTTPS) so captive portals can't silently forward the request - they must
# respond themselves, producing a detectable status code mismatch.
endpoints:
  - url: "http://connectivitycheck.gstatic.com/generate_204"
    expected_code: 204
    desc: "Google connectivity check (used by Android) - returns 204 No Content on real internet"
  - url: "http://clients3.google.com/generate_204"
    expected_code: 204
    desc: "Google connectivity check alternate host - returns 204 No Content on real internet"
  - url: "http://www.gstatic.com/generate_204"
    expected_code: 204
    desc: "Google static host alternate - returns 204 No Content on real internet"
  - url: "http://connect.rom.miui.com/generate_204"
    expected_code: 204
    desc: "Xiaomi/MIUI connectivity check - China-accessible 204 endpoint"
  - url: "http://connectivitycheck.platform.hicloud.com/generate_204"
    expected_code: 204
    desc: "Huawei connectivity check - China-accessible 204 endpoint"
  - url: "http://www.msftconnecttest.com/connecttest.txt"
    expected_code: 200
    expected_body: "Microsoft Connect Test"
    desc: "Windows NCSI current endpoint - returns 200 with Microsoft Connect Test body"
  - url: "http://www.msftncsi.com/ncsi.txt"
    expected_code: 200
    expected_body: "Microsoft NCSI"
    desc: "Windows NCSI legacy endpoint - returns 200 with Microsoft NCSI body"
