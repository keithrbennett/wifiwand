name: Test Suite

on:
  push:
    branches: [ main, add-ubuntu ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Ubuntu runs all supported Ruby versions cheaply. Ruby 4.0 is included
        # to catch breaking changes early; drop older versions here as they reach EOL.
        ruby-version: ['3.2', '3.3', '3.4', '4.0']
        os: [ubuntu-latest]
        include:
          - os: macos-latest
            ruby-version: '4.0'
          - os: ubuntu-latest
            ruby-version: jruby

    steps:
    - uses: actions/checkout@v6

    - name: Set up Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true

    - name: Run tests
      # The default CI environment already runs only safe tests unless
      # WIFIWAND_REAL_ENV_TESTS is set explicitly.
      run: bundle exec rspec

    - name: Upload coverage reports
      id: codecov
      uses: codecov/codecov-action@v6
      if: matrix.ruby-version == '4.0' && matrix.os == 'ubuntu-latest'
      continue-on-error: true
      with:
        files: ./coverage/coverage.xml
        disable_search: true
        fail_ci_if_error: true
        # Configure CODECOV_TOKEN for protected-branch uploads; public fork PRs
        # can still use Codecov's tokenless path when organization settings allow it.
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Warn when coverage upload fails
      if: steps.codecov.outcome == 'failure'
      run: echo "::warning::Codecov upload failed; tests passed, but coverage publishing needs attention."

  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0'
        bundler-cache: true

    - name: Run RuboCop
      run: bundle exec rubocop
