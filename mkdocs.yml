site_name: wifi-wand Documentation
site_description: Cross-platform WiFi management gem and CLI for macOS and Ubuntu
site_url: https://keithrbennett.github.io/wifiwand/
repo_url: https://github.com/keithrbennett/wifiwand
repo_name: keithrbennett/wifiwand

docs_dir: docs
site_dir: site

exclude_docs: |
  .bundle/
  .claude/
  .codex/
  .config/
  .devcontainer/
  .git/
  .github/
  .idea/
  .kilo/
  .venv/
  .venv-*/
  coverage/
  coverage*/
  dev/prompts/
  dev/reports/
  hooks/
  lib/
  libexec/
  pkg/
  spec/
  test/
  tmp/
  untracked/
  vendor/
  bin/.*
  *.gem

theme:
  name: material
  features:
    - content.code.copy
    - navigation.expand
    - navigation.footer
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.snippets:
      base_path:
        - .
  - fenced_code
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
      - Docs Index: docs/README.md
      - macOS Quick Start: docs/MACOS_QUICK_START.md
      - Ubuntu Setup: docs/UBUNTU_SETUP.md
      - Security Notes: docs/SECURITY_NOTES.md
      - Status Command: docs/STATUS_COMMAND.md
      - Info Command: docs/INFO_COMMAND.md
      - Connectivity Checking: docs/CONNECTIVITY_CHECKING.md
      - Logging: docs/LOGGING.md
      - DNS Configuration: docs/DNS_Configuration_Guide.md
      - Environment Variables: docs/ENVIRONMENT_VARIABLES.md
      - macOS Helper App Details: docs/MACOS_HELPER_APP_DETAILS.md
      - Breaking Changes v3: docs/BREAKING_CHANGES_V3.md
      - Version 3 Change Log: docs/CHANGELOG_V2_TO_V3.md
      - Release Notes: RELEASE_NOTES.md
  - Developer Guide:
      - Docs Index: dev/docs/README.md
      - Documentation Server: dev/docs/DOC_SERVER.md
      - Testing: dev/docs/TESTING.md
      - Command Architecture: dev/docs/COMMAND_ARCHITECTURE.md
      - public_ip Command Design: dev/docs/PUBLIC_IP_COMMAND_DESIGN.md
      - Connected vs Internet Connectivity: dev/docs/CONNECTED_VS_INTERNET_CONNECTIVITY.md
      - macOS Helper Research: dev/docs/MAC_HELPER_RESEARCH.md
      - macOS Helper Permissions: dev/docs/MAC_HELPER_PERMISSIONS.md
      - AI VM Setup: dev/docs/AI_VM_SETUP.md

extra:
  generator: false
